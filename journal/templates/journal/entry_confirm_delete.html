{% extends 'base.html' %}
{% block content %}
<h1>Удалить запись?</h1>
<p style="color: var(--text-soft); margin-bottom: 24px;">
    «{{ object.preview }}» — исчезнет. Восстановить можно будет позже из архива (это сделаем на этапе 5).
</p>
<form method="post">
    {% csrf_token %}
    <div style="display: flex; gap: 10px;">
        <a href="{% url 'entry_detail' object.pk %}" class="btn-ghost" style="flex: 1; text-align: center;">отмена</a>
        <button type="submit" class="btn-soft danger" style="flex: 1;">да, удалить</button>
    </div>
</form>
{% endblock %}
